name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  HF_DATASET_REPO: adamtopaz/mathlib_const_deps

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: leanprover/lean-action@v1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Publish const_dep dataset
        id: scout
        uses: mathlib-initiative/scout-action@035bf2b3e772d060de765583f9c0d311b797b524
        with:
          hf_repo_id: ${{ env.HF_DATASET_REPO }}
          hf_token: ${{ secrets.HF_TOKEN }}
          command: const_dep
          target_kind: imports
          target_values: |
            Mathlib
          readme_template: .github/datasets/const_dep.README.md.j2
          dry_run: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}

      - name: Show scout-action outputs
        run: |
          echo "Parquet files: ${{ steps.scout.outputs.parquet_count }}"
          echo "Data dir: ${{ steps.scout.outputs.data_dir }}"
          echo "README: ${{ steps.scout.outputs.readme_path }}"
          echo "Dataset URL: ${{ steps.scout.outputs.dataset_url }}"
          echo "Scout command: ${{ steps.scout.outputs.scout_command }}"
