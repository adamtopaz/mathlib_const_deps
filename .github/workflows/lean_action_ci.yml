name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  HF_DATASET_REPO: mathlib-initiative/mathlib_const_deps

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: leanprover/lean-action@v1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.13"

      - name: Dry-run const_dep dataset publish
        id: scout
        uses: mathlib-initiative/scout-action@v1
        with:
          hf_repo_id: ${{ env.HF_DATASET_REPO }}
          command: const_dep
          target_kind: imports
          target_values: |
            Mathlib
          dry_run: true

      - name: Show scout-action outputs
        run: |
          echo "Parquet files: ${{ steps.scout.outputs.parquet_count }}"
          echo "Data dir: ${{ steps.scout.outputs.data_dir }}"
          echo "README: ${{ steps.scout.outputs.readme_path }}"
          echo "Dataset URL: ${{ steps.scout.outputs.dataset_url }}"
          echo "Scout command: ${{ steps.scout.outputs.scout_command }}"
